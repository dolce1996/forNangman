  <h2>글쓰기</h2>
<input type="text" id="title" placeholder="제목"><br><br>
<textarea id="content" placeholder="내용"></textarea><br><br>
<button onclick="submitPost()">작성</button>

<script>
function submitPost() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;

  fetch("https://script.google.com/macros/s/AKfycbwo5Wn3xcXmkwFFscliVHg4qtuN0RuPgHzJ8jE3f3EmtuUX8aynRZaBcMqYZWWKVcyP/exec", {
    method: "POST",
    body: JSON.stringify({
      category: "dolce",
      title: title,
      content: content
    })
  }).then(() => {
    alert("등록 완료");
  });
}
</script>
</body>
