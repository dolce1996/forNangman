<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>STL Viewer</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; }
    canvas { display:block; }
  </style>
</head>
<body>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.150.1/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/STLLoader.js';
import { OrbitControls } from 'https://unpkg.com/three@0.150.1/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 10000);
camera.position.set(0, 0, 100);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(1, 1, 1);
scene.add(light);

const file = new URLSearchParams(location.search).get("file") || "1_button_guard.stl";
const url = `https://raw.githubusercontent.com/dolce1996/forNangman/main/stl/${file}`;

new STLLoader().load(url, geometry => {
  geometry.center();

  const mesh = new THREE.Mesh(
    geometry,
    new THREE.MeshNormalMaterial()
  );

  scene.add(mesh);

  animate();
}, undefined, err => {
  console.error(err);
  alert("STL 파일을 불러오지 못했습니다.");
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
