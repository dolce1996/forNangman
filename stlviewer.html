<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>STL Viewer</title>
  <style>
    body {
      margin:0;
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
      font-family:Arial, sans-serif;
    }

    #viewerBox {
      width:800px;
      height:600px;
      position:relative;
      border:1px solid #333;
      background:#111;
    }

    canvas {
      display:block;
      width:800px;
      height:600px;
    }

    #downloadBtn {
      position:fixed;
      top:12px;
      right:12px;
      z-index:100;
      background:#ffffff;
      color:#111;
      padding:8px 12px;
      border-radius:6px;
      text-decoration:none;
      font-size:14px;
      font-weight:bold;
    }
  </style>
</head>
<body>

<a id="downloadBtn">STL 다운로드</a>
<div id="viewerBox"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.150.1/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from 'https://unpkg.com/three@0.150.1/examples/jsm/loaders/STLLoader.js';
import { OrbitControls } from 'https://unpkg.com/three@0.150.1/examples/jsm/controls/OrbitControls.js';

const WIDTH = 800;
const HEIGHT = 600;

const viewerBox = document.getElementById("viewerBox");

const file = new URLSearchParams(location.search).get("file") || "1_button_guard.stl";
const url = `https://raw.githubusercontent.com/dolce1996/forNangman/main/stl/${file}`;

const downloadBtn = document.getElementById("downloadBtn");
downloadBtn.href = url;
downloadBtn.download = file;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, WIDTH / HEIGHT, 0.1, 10000);
camera.position.set(0, 0, 100);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(WIDTH, HEIGHT);
viewerBox.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(1, 1, 1);
scene.add(light);

new STLLoader().load(url, geometry => {
  geometry.center();

  const mesh = new THREE.Mesh(
    geometry,
    new THREE.MeshNormalMaterial()
  );

  scene.add(mesh);

  const box = new THREE.Box3().setFromObject(mesh);
  const size = box.getSize(new THREE.Vector3()).length();
  camera.position.set(0, 0, size * 1.5);
  controls.update();

  animate();
}, undefined, err => {
  console.error(err);
  alert("STL 파일을 불러오지 못했습니다.");
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
</script>

</body>
</html>
